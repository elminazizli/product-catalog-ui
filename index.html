<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

    <div class="max-w-[1320px] mx-auto w-[90%]">

        <!-- basliq -->
        <header class="flex flex-col md:flex-row justify-between items-center py-5 gap-4">

            <h2 class="text-2xl font-bold">🛍️ My Shop</h2>

            <input id="searchInput" type="text" placeholder="🔍 Search products..."
                class="w-full md:w-1/3 border border-gray-300 p-3 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-red-400 transition">
        </header>

        <!-- kartlar -->
        <div class="grid lg:grid-cols-4 md:grid-cols-3 sm:grid-cols-2 gap-7" id="products">
        </div>
<!-- ---------------------- -->
        <div class="flex gap-7.5 my-10 justify-center" id="paginations"></div>
    <!-- ----------------------- -->
    </div>

    <script src="./main.js"></script>
</body>

</html>
